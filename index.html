<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LuxeVisuals — Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>

<style>
:root {
  --gold: #C9A84C;
  --black: #080808;
  --text: #F0EAD6;
  --text-muted: #8A7F6A;
}

body {
  margin:0;
  background:var(--black);
  color:var(--text);
  font-family:'Jost', sans-serif;
}

/* NAV */
nav {
  position:fixed;
  width:100%;
  padding:20px 60px;
  display:flex;
  justify-content:space-between;
  background:rgba(0,0,0,0.7);
}

.nav-logo { color:var(--gold); text-decoration:none; }

/* HERO */
.hero {
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  position:relative;
  background:url('Banner.png') center/cover no-repeat;
}

.hero::before {
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.65);
}

.hero * { position:relative; }

.profile {
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid var(--gold);
  margin-bottom:20px;
}

.hero-title {
  font-size:70px;
  font-family:'Cormorant Garamond', serif;
}

.hero-title em { color:var(--gold); font-style:italic; }

/* WORK */
.work {
  padding:80px 60px;
}

.work-grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:20px;
}

.work-card {
  background:#111;
  border:1px solid rgba(255,255,255,0.1);
}

.card-img-wrap {
  aspect-ratio:16/10;
  background:#222;
  display:flex;
  align-items:center;
  justify-content:center;
}

.card-meta {
  padding:15px;
  display:flex;
  justify-content:space-between;
}

</style>
</head>

<body>

<nav>
  <a class="nav-logo">LuxeVisuals</a>
</nav>

<section class="hero">
  <img src="Profile.png" class="profile">

  <h1 class="hero-title">Luxe<em>Visuals</em></h1>
  <p>Crafting interfaces that captivate</p>
</section>

<section class="work">
  <h2>Portfolio</h2>

  <div class="work-grid">

    <div class="work-card">
      <div class="card-img-wrap">Project 1</div>
      <div class="card-meta"><span>Main Menu UI</span><span>UI</span></div>
    </div>

    <div class="work-card">
      <div class="card-img-wrap">Project 2</div>
      <div class="card-meta"><span>HUD System</span><span>UI</span></div>
    </div>

    <div class="work-card">
      <div class="card-img-wrap">Project 3</div>
      <div class="card-meta"><span>Inventory Screen</span><span>UI</span></div>
    </div>

    <div class="work-card">
      <div class="card-img-wrap">Project 4</div>
      <div class="card-meta"><span>Shop UI</span><span>UI</span></div>
    </div>

  </div>
</section>

</body>
</html>
