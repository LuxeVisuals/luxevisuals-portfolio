<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LuxeVisuals — Contact</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --gold-dim: #7A5E28;
    --black: #080808;
    --surface: #101010;
    --surface2: #161616;
    --border: rgba(201,168,76,0.18);
    --border-strong: rgba(201,168,76,0.4);
    --text: #F0EAD6;
    --text-muted: #8A7F6A;
    --font-display: 'Cormorant Garamond', serif;
    --font-body: 'Jost', sans-serif;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--black);
    color: var(--text);
    font-family: var(--font-body);
    font-weight: 300;
    line-height: 1.7;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* NAV */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.25rem 4rem;
    background: rgba(8,8,8,0.88);
    backdrop-filter: blur(12px);
    border-bottom: 0.5px solid var(--border);
  }

  .nav-logo {
    font-family: var(--font-display);
    font-size: 1.35rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    color: var(--gold);
    text-decoration: none;
  }

  .nav-links {
    display: flex;
    gap: 2.5rem;
    list-style: none;
  }

  .nav-links a {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
    text-decoration: none;
    padding: 0.5rem 1rem;
    border: 0.5px solid transparent;
    transition: color 0.2s, border-color 0.2s;
  }

  .nav-links a:hover {
    color: var(--gold);
    border-color: var(--border-strong);
  }

  /* CONTACT */
  .contact {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8rem 2rem 4rem;
  }

  .contact-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    padding: 3rem 2.5rem;
    max-width: 520px;
    width: 100%;
    text-align: center;
  }

  .section-label {
    font-size: 0.6rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.5rem;
  }

  .section-title {
    font-family: var(--font-display);
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 300;
    line-height: 1.1;
    color: var(--text);
    margin-bottom: 0.5rem;
  }

  .contact-note {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-bottom: 2rem;
    line-height: 1.6;
    letter-spacing: 0.03em;
  }

  .toggle-buttons {
    display: flex;
    justify-content: center;
    gap: 1rem;
    margin-bottom: 2rem;
  }

  .toggle-btn {
    background: transparent;
    border: 0.5px solid var(--border);
    color: var(--text-muted);
    font-family: var(--font-body);
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    padding: 0.75rem 2rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .toggle-btn.active,
  .toggle-btn:hover {
    background: var(--gold);
    color: var(--black);
    border-color: var(--gold);
  }

  .form-group {
    margin-bottom: 1.5rem;
    text-align: left;
  }

  label {
    display: block;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 0.5rem;
  }

  input, textarea {
    width: 100%;
    background: var(--surface2);
    border: 0.5px solid var(--border);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 0.8rem;
    padding: 0.75rem 1rem;
    resize: vertical;
    transition: border-color 0.2s;
  }

  input:focus, textarea:focus {
    outline: none;
    border-color: var(--gold);
  }

  .submit-btn {
    width: 100%;
    background: var(--gold);
    color: var(--black);
    border: none;
    font-family: var(--font-body);
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    padding: 0.85rem;
    cursor: pointer;
    transition: opacity 0.2s;
    margin-top: 0.5rem;
  }

  .submit-btn:hover {
    opacity: 0.9;
  }

  .success-msg {
    color: var(--gold);
    font-size: 0.75rem;
    margin-top: 1rem;
    display: none;
  }

  /* FOOTER */
  footer {
    padding: 3rem 4rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 0.5px solid var(--border);
    max-width: 1200px;
    margin: 0 auto;
  }

  .footer-logo { font-family: var(--font-display); font-size: 1.2rem; font-weight: 600; letter-spacing: 0.12em; color: var(--gold); }
  .footer-links { display: flex; gap: 2rem; list-style: none; align-items: center; }
  .footer-links a { font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted); text-decoration: none; transition: color 0.2s; }
  .footer-links a:hover { color: var(--gold); }
  .discord-info { font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted); }
  .footer-copy { font-size: 0.6rem; color: var(--text-muted); letter-spacing: 0.1em; }
</style>
</head>
<body>
<nav>
  <a class="nav-logo" href="index.html">LuxeVisuals</a>
  <ul class="nav-links">
    <li><a href="about.html">About</a></li>
    <li><a href="work.html">Work</a></li>
    <li><a href="services.html">Services</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>

<section class="contact" id="contact">
  <div class="contact-card">
    <p class="section-label">Get in touch</p>
    <h2 class="section-title">Contact</h2>
    <p class="contact-note">This form just lets me know you'd like to chat.<br>I'll reach out to you on the platform you select below.</p>

    <!-- Toggle -->
    <div class="toggle-buttons">
      <button class="toggle-btn active" id="btnDiscord">Discord</button>
      <button class="toggle-btn" id="btnX">X</button>
    </div>

    <!-- Form -->
    <form id="contactForm">
      <div class="form-group">
        <label id="usernameLabel">Discord Username</label>
        <input type="text" id="username" placeholder="yourname#1234" required>
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="description" rows="5" placeholder="Tell me about your project..." required></textarea>
      </div>
      <button type="submit" class="submit-btn">Send</button>
    </form>
    <p class="success-msg" id="successMsg">Message sent! I'll reach out soon.</p>
  </div>
</section>

<footer>
  <div class="footer-logo">LuxeVisuals</div>
  <ul class="footer-links">
    <li><a href="https://x.com/LuxeVisualsDev" target="_blank">X / Twitter</a></li>
    <li class="discord-info">Discord: luxevisuals</li>
  </ul>
  <p class="footer-copy">© 2026 LuxeVisuals</p>
</footer>

<script>
  // Your webhook URLs and Discord ID
  const WEBHOOK_DISCORD = "https://discord.com/api/webhooks/1497322939316441168/IUdODZO0E_NjvcjYM2-K2DoMFldAFataZl0J4knfnVjxCwJ2NU0GAdGLMt9lvoN0ygZQ";
  const WEBHOOK_X = "https://discord.com/api/webhooks/1497322608558084167/YDfUPSpnEkTf12sIMPsBIb8ArArAr6W6Waf5LseXBhUn7ldraOZ--83tEbR62GQ13K1V";
  const YOUR_DISCORD_ID = "1057018141433139281";

  // Toggle logic
  const btnDiscord = document.getElementById('btnDiscord');
  const btnX = document.getElementById('btnX');
  const usernameLabel = document.getElementById('usernameLabel');
  const usernameInput = document.getElementById('username');
  let currentPlatform = 'discord';

  btnDiscord.addEventListener('click', () => {
    btnDiscord.classList.add('active');
    btnX.classList.remove('active');
    usernameLabel.textContent = 'Discord Username';
    usernameInput.placeholder = 'yourname#1234';
    currentPlatform = 'discord';
  });

  btnX.addEventListener('click', () => {
    btnX.classList.add('active');
    btnDiscord.classList.remove('active');
    usernameLabel.textContent = 'X / Twitter Username';
    usernameInput.placeholder = '@yourhandle';
    currentPlatform = 'x';
  });

  // Form submission
  const form = document.getElementById('contactForm');
  const successMsg = document.getElementById('successMsg');
  const submitBtn = form.querySelector('.submit-btn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    submitBtn.disabled = true;
    submitBtn.textContent = 'Sending...';

    const username = usernameInput.value.trim();
    const description = document.getElementById('description').value.trim();
    const webhookUrl = currentPlatform === 'discord' ? WEBHOOK_DISCORD : WEBHOOK_X;

    const embed = {
      title: `New ${currentPlatform === 'discord' ? 'Discord' : 'X'} inquiry`,
      color: 0xC9A84C,
      fields: [
        { name: `${currentPlatform === 'discord' ? 'Discord' : 'X'} Username`, value: username, inline: false },
        { name: 'Description', value: description, inline: false }
      ],
      timestamp: new Date().toISOString()
    };

    const payload = {
      content: `<@${YOUR_DISCORD_ID}> You have a new contact request!`,
      embeds: [embed]
    };

    try {
      const response = await fetch(webhookUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      if (response.ok) {
        successMsg.style.display = 'block';
        form.reset();
        submitBtn.textContent = 'Send';
        submitBtn.disabled = false;
        setTimeout(() => { successMsg.style.display = 'none'; }, 5000);
      } else {
        alert('Failed to send. Please try again later.');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Send';
      }
    } catch (error) {
      alert('Network error. Please check your connection.');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Send';
    }
  });
</script>
</body>
</html>
